<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E87722">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="衛生法規">
  <title>衛生法規 暗記アプリ</title>
  <style>
    :root {
      --orange: #E87722;
      --orange-light: #FFF0E0;
      --orange-dark: #C45F00;
      --green: #2E9E5B;
      --green-light: #E6F7ED;
      --red: #D94040;
      --red-light: #FDEAEA;
      --bg: #FFF8F0;
      --card: #FFFFFF;
      --text: #2D2D2D;
      --sub: #666666;
      --border: #E0C8A8;
      --r: 16px;
      --sh: 0 4px 16px rgba(0,0,0,0.10);
    }
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }
    html { height: 100%; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    /* --- SCREENS --- */
    .screen { display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* --- HOME --- */
    #scr-home {
      align-items: center;
      min-height: 100vh;
      padding: 44px 20px 48px;
      background: linear-gradient(160deg, #FFF0D8 0%, #FFF8F0 60%);
      gap: 0;
    }
    .home-logo { font-size: 54px; margin-bottom: 6px; }
    .home-title { font-size: 22px; font-weight: 800; color: var(--orange-dark); margin-bottom: 4px; }
    .home-sub { font-size: 13px; color: var(--sub); margin-bottom: 22px; }

    .stats-row {
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--sh);
      width: 100%; max-width: 420px;
      padding: 14px 8px;
      display: flex; justify-content: space-around;
      margin-bottom: 10px;
    }
    .stat { text-align: center; }
    .stat-n { font-size: 26px; font-weight: 800; color: var(--orange); }
    .stat-l { font-size: 12px; color: var(--sub); margin-top: 2px; }
    #home-last { font-size: 13px; color: var(--sub); margin-bottom: 22px; }

    /* Mode cards */
    .mode-cards { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
    .mode-card {
      width: 100%;
      background: var(--card);
      border-radius: var(--r);
      border: 2px solid var(--border);
      box-shadow: var(--sh);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      touch-action: manipulation;
      text-align: left;
      font-family: inherit;
      transition: border-color .15s, background .15s;
    }
    .mode-card.sel { border-color: var(--orange); background: var(--orange-light); }
    .mode-card:active { opacity: .85; }
    .mc-icon { font-size: 30px; flex-shrink: 0; }
    .mc-body { flex: 1; }
    .mc-name { font-size: 17px; font-weight: 700; }
    .mc-desc { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .mc-check { font-size: 20px; color: var(--orange); flex-shrink: 0; }

    /* Options */
    .opts {
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--sh);
      width: 100%; max-width: 420px;
      padding: 4px 20px;
      margin-bottom: 22px;
    }
    .opt-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
    }
    .opt-row + .opt-row { border-top: 1px solid #F0E0CC; }
    .opt-lbl { font-size: 16px; font-weight: 600; }
    .sw { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
    .sw input { opacity: 0; width: 0; height: 0; position: absolute; }
    .sw-track {
      position: absolute; inset: 0;
      background: #CCC; border-radius: 30px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .2s;
    }
    .sw-track::before {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
      transition: transform .2s;
    }
    .sw input:checked ~ .sw-track { background: var(--orange); }
    .sw input:checked ~ .sw-track::before { transform: translateX(22px); }

    /* Buttons on home */
    .btn-start {
      width: 100%; max-width: 420px;
      background: var(--orange); color: #fff;
      border: none; border-radius: 50px;
      padding: 18px; font-size: 19px; font-weight: 800;
      cursor: pointer; touch-action: manipulation;
      font-family: inherit;
      box-shadow: 0 4px 18px rgba(232,119,34,.4);
      margin-bottom: 12px;
      transition: background .15s;
    }
    .btn-start:active { background: var(--orange-dark); }
    .btn-ghost {
      background: none; color: var(--sub);
      border: 2px solid var(--border);
      border-radius: 50px; padding: 12px 24px;
      font-size: 15px; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      transition: border-color .15s;
    }
    .btn-ghost:active { border-color: var(--red); color: var(--red); }

    /* --- QUIZ HEADER --- */
    .qhdr {
      background: var(--orange); color: #fff;
      padding: 14px 18px 12px;
      position: sticky; top: 0; z-index: 20;
      flex-shrink: 0;
    }
    .qhdr-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .btn-back {
      background: rgba(255,255,255,.22); border: none; border-radius: 50%;
      width: 38px; height: 38px; color: #fff; font-size: 22px;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-back:active { background: rgba(255,255,255,.4); }
    .mode-pill {
      font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,.25);
      padding: 4px 12px; border-radius: 20px;
    }
    .qcounter { font-size: 15px; font-weight: 600; }
    .prog-wrap {
      background: rgba(255,255,255,.3);
      border-radius: 10px; height: 8px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; background: #fff; border-radius: 10px;
      transition: width .4s ease; width: 0%;
    }

    /* --- QUIZ BODY --- */
    #quiz-body {
      flex: 1;
      padding: 18px 16px 48px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .cat-badge {
      display: inline-block;
      background: var(--orange-light); color: var(--orange-dark);
      font-size: 13px; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid #F0C890;
      word-break: keep-all;
    }
    .q-card {
      background: var(--card);
      border-radius: var(--r); border: 1px solid var(--border);
      box-shadow: var(--sh);
      padding: 20px 18px;
      font-size: 17px; line-height: 2; letter-spacing: .03em;
    }
    .blank {
      display: inline-block;
      background: #FFF0D0; border: 2px solid var(--orange);
      border-radius: 6px; padding: 2px 10px;
      font-weight: 700; color: var(--orange-dark);
      min-width: 56px; text-align: center;
      transition: background .2s, border-color .2s, color .2s;
    }
    .blank.ok  { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .blank.ng  { background: var(--red-light);   border-color: var(--red);   color: var(--red);   }

    .score-bar {
      background: var(--card); border-radius: 12px;
      padding: 10px 16px; border: 1px solid var(--border);
      display: flex; gap: 14px; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .s-ok { color: var(--green); font-weight: 700; }
    .s-ng { color: var(--red); font-weight: 700; }
    .s-all { color: var(--sub); }

    /* Input mode */
    .inp-wrap { display: flex; flex-direction: column; gap: 10px; }
    .ans-inp {
      width: 100%; padding: 15px 16px; font-size: 18px;
      border: 2px solid var(--border); border-radius: 12px;
      background: #fff; outline: none; font-family: inherit;
      -webkit-appearance: none;
      transition: border-color .15s;
    }
    .ans-inp:focus { border-color: var(--orange); }
    .btn-judge {
      background: var(--orange); color: #fff; border: none;
      border-radius: 50px; padding: 15px;
      font-size: 17px; font-weight: 700; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      transition: background .15s;
    }
    .btn-judge:active { background: var(--orange-dark); }
    .btn-judge:disabled { background: #CCC; cursor: default; }

    /* Feedback */
    .fb {
      display: none;
      border-radius: var(--r); padding: 16px 18px;
      font-size: 17px; font-weight: 700;
      align-items: center; gap: 12px;
    }
    .fb.show { display: flex; }
    .fb.ok { background: var(--green-light); border: 2px solid var(--green); color: var(--green); }
    .fb.ng { background: var(--red-light);   border: 2px solid var(--red);   color: var(--red); }
    .fb-ico { font-size: 26px; flex-shrink: 0; }
    .fb-txt { flex: 1; line-height: 1.5; }

    /* Choices */
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice {
      width: 100%;
      background: var(--card); border: 2px solid var(--border);
      border-radius: 12px; padding: 15px 16px;
      font-size: 17px; font-weight: 600; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      text-align: left;
      display: flex; align-items: center; gap: 12px;
      color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .choice:active:not(:disabled) { opacity: .8; }
    .choice.ok { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .choice.ng { background: var(--red-light);   border-color: var(--red);   color: var(--red); }
    .choice.reveal { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .choice:disabled { cursor: default; }
    .c-lbl {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--border); color: var(--sub);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .choice.ok .c-lbl,
    .choice.reveal .c-lbl { background: var(--green); color: #fff; }
    .choice.ng .c-lbl     { background: var(--red); color: #fff; }

    /* Next button */
    .btn-next {
      display: none;
      background: var(--orange); color: #fff; border: none;
      border-radius: 50px; padding: 16px; font-size: 17px;
      font-weight: 700; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      width: 100%;
      box-shadow: 0 4px 14px rgba(232,119,34,.35);
      transition: background .15s;
    }
    .btn-next.show { display: block; }
    .btn-next:active { background: var(--orange-dark); }

    /* --- RESULT --- */
    #scr-result {
      align-items: center;
      min-height: 100vh;
      padding: 44px 20px 48px;
      background: linear-gradient(160deg, #FFF0D8 0%, #FFF8F0 60%);
      gap: 0;
    }
    .res-emoji { font-size: 68px; margin-bottom: 10px; }
    .res-title { font-size: 22px; font-weight: 800; color: var(--orange-dark); margin-bottom: 8px; }
    .res-pct { font-size: 64px; font-weight: 900; color: var(--orange); margin-bottom: 4px; }
    .res-pct span { font-size: 28px; }
    .res-detail { font-size: 15px; color: var(--sub); margin-bottom: 26px; }
    .res-btns { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }
    .btn-res {
      width: 100%; border: none; border-radius: 50px; padding: 16px;
      font-size: 17px; font-weight: 700; font-family: inherit;
      cursor: pointer; touch-action: manipulation;
      transition: opacity .15s;
    }
    .btn-res:active { opacity: .8; }
    .btn-res.primary { background: var(--orange); color: #fff; box-shadow: 0 4px 14px rgba(232,119,34,.35); }
    .btn-res.danger  { background: #fff; color: var(--red); border: 2px solid var(--red); }
    .btn-res.ghost   { background: #fff; color: var(--sub); border: 2px solid var(--border); }
    .wrong-card {
      background: var(--card); border-radius: var(--r);
      border: 1px solid var(--border); box-shadow: var(--sh);
      padding: 18px 18px; width: 100%; max-width: 420px;
      margin-top: 22px;
    }
    .wrong-title { font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 10px; }
    .wrong-item {
      font-size: 14px; color: var(--text); padding: 8px 0;
      border-bottom: 1px solid #F0E0CC; line-height: 1.5;
    }
    .wrong-item:last-child { border-bottom: none; }
    .wrong-ans { color: var(--orange); font-weight: 700; }
  </style>
</head>
<body>

<!-- HOME -->
<div id="scr-home" class="screen">
  <div class="home-logo">📖</div>
  <div class="home-title">衛生法規 暗記アプリ</div>
  <div class="home-sub">１学期試験対策プリント</div>

  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-total">41</div><div class="stat-l">全問題数</div></div>
    <div class="stat"><div class="stat-n" id="s-master">0</div><div class="stat-l">習得済み</div></div>
    <div class="stat"><div class="stat-n" id="s-rate">0%</div><div class="stat-l">正答率</div></div>
  </div>
  <div id="home-last">最終学習：まだ学習していません</div>

  <div class="mode-cards">
    <button class="mode-card sel" id="mc-input" type="button">
      <span class="mc-icon">✏️</span>
      <span class="mc-body">
        <span class="mc-name">入力モード</span>
        <span class="mc-desc" style="display:block">答えをキーボードで入力して確認</span>
      </span>
      <span class="mc-check" id="chk-input">✓</span>
    </button>
    <button class="mode-card" id="mc-choice" type="button">
      <span class="mc-icon">🔘</span>
      <span class="mc-body">
        <span class="mc-name">４択モード</span>
        <span class="mc-desc" style="display:block">４つの選択肢から正解を選ぶ</span>
      </span>
      <span class="mc-check" id="chk-choice" style="visibility:hidden">✓</span>
    </button>
  </div>

  <div class="opts">
    <div class="opt-row">
      <span class="opt-lbl">🔀 ランダム出題</span>
      <label class="sw">
        <input type="checkbox" id="opt-rand" checked>
        <span class="sw-track"></span>
      </label>
    </div>
    <div class="opt-row">
      <span class="opt-lbl">❌ 間違えた問題のみ</span>
      <label class="sw">
        <input type="checkbox" id="opt-miss">
        <span class="sw-track"></span>
      </label>
    </div>
  </div>

  <button class="btn-start" id="btn-start" type="button">スタート ▶</button>
  <button class="btn-ghost" id="btn-reset" type="button">学習履歴をリセット</button>
</div>

<!-- QUIZ -->
<div id="scr-quiz" class="screen">
  <div class="qhdr">
    <div class="qhdr-top">
      <button class="btn-back" id="btn-back" type="button">‹</button>
      <span class="mode-pill" id="mode-pill">✏️ 入力モード</span>
      <span class="qcounter" id="q-count">1 / 41</span>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
  </div>
  <div id="quiz-body"></div>
</div>

<!-- RESULT -->
<div id="scr-result" class="screen">
  <div class="res-emoji" id="r-emoji">🎉</div>
  <div class="res-title">お疲れさまでした！</div>
  <div class="res-pct" id="r-pct">0<span>%</span></div>
  <div class="res-detail" id="r-detail">0問正解 / 0問中</div>

  <div class="res-btns">
    <button class="btn-res primary" id="btn-retry" type="button">🔄 もう一度</button>
    <button class="btn-res danger"  id="btn-review" type="button">❌ 間違えた問題を復習</button>
    <button class="btn-res ghost"   id="btn-rhome"  type="button">🏠 ホームに戻る</button>
  </div>
  <div class="wrong-card" id="wrong-card" style="display:none">
    <div class="wrong-title">❌ 間違えた問題</div>
    <div id="wrong-body"></div>
  </div>
</div>

<script>
/* ======================================================
   問題データ
====================================================== */
var Q = [
  { id:1,  cat:"①調理師法の目的",
    q:"この法律は、調理師の資格等を定めて調理の業務に従事する者の【】を向上させることにより、調理技術の合理的な発達を図り、もって国民の食生活の向上に資することを目的とする。",
    a:"資質", ch:["資質","資格","知識","技能"] },
  { id:2,  cat:"①調理師法の目的",
    q:"…調理の業務に従事する者の資質を向上させることにより【】の合理的な発達を図り、もって国民の食生活の向上に資することを目的とする。",
    a:"調理技術", ch:["調理技術","調理方法","調理技能","調理知識"] },
  { id:3,  cat:"①調理師法の目的",
    q:"…調理技術の合理的な発達を図り、もって【】の向上に資することを目的とする。",
    a:"国民の食生活", ch:["国民の食生活","国民の健康","食品の安全","公衆衛生"] },
  { id:4,  cat:"②調理師の定義",

    a:"名称", ch:["名称","資格","免許証","登録番号"] },
  { id:5,  cat:"②調理師の定義",

    a:"都道府県知事", ch:["都道府県知事","厚生労働大臣","市町村長","保健所長"] },
  { id:6,  cat:"②調理師の定義（名称の使用制限）",

  { id:7,  cat:"②調理師の定義（罰則）",

  { id:8,  cat:"③調理師の免許",

  { id:9,  cat:"③調理師の免許（第三条一号）",

  { id:10, cat:"③調理師の免許（第三条一号）",

    a:"高等学校", ch:["高等学校","大学","専門学校","中学校"] },
  { id:11, cat:"③調理師の免許（第三条一号）",
    q:"都道府県知事の指定する【】において、1年以上、調理、栄養及び衛生に関して調理師たるに必要な知識及び技能を修得したもの",
    a:"調理師養成施設", ch:["調理師養成施設","専門学校","職業訓練校","調理技術学校"] },
  { id:12, cat:"③調理師の免許（第三条一号）",
    q:"都道府県知事の指定する調理師養成施設において、【】以上、調理、栄養及び衛生に関して調理師たるに必要な知識及び技能を修得したもの",
    a:"1年", ch:["1年","2年","3年","6か月"] },

/* ======================================================
   状態
====================================================== */
var mode = "input";   // "input" | "choice"
var queue = [];
var idx = 0;
var okCnt = 0;
var ngIds = [];
var answered = false;

/* ======================================================
   LocalStorage
====================================================== */
var LS = "eisei_v2";
function loadH() {
  try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch(e) { return {}; }
}
function saveH(h) {
  try { localStorage.setItem(LS, JSON.stringify(h)); } catch(e) {}
}

/* ======================================================
   画面
====================================================== */
function show(id) {
  var ids = ["scr-home","scr-quiz","scr-result"];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

/* ======================================================
   ホーム統計
====================================================== */
function refreshHome() {
  var h = loadH();
  var sessions = h.sessions || [];
  var tc = 0, tq = 0;
  for (var i = 0; i < sessions.length; i++) { tc += sessions[i].c; tq += sessions[i].t; }
  var rate = tq > 0 ? Math.round(tc / tq * 100) : 0;
  document.getElementById("s-total").textContent  = Q.length;
  document.getElementById("s-master").textContent = (h.mastered || []).length;
  document.getElementById("s-rate").textContent   = rate + "%";
  if (h.lastDate) document.getElementById("home-last").textContent = "最終学習：" + h.lastDate;
}

/* ======================================================
   モード選択
====================================================== */
function selectMode(m) {
  mode = m;
  document.getElementById("mc-input").classList.toggle("sel", m === "input");
  document.getElementById("mc-choice").classList.toggle("sel", m === "choice");
  document.getElementById("chk-input").style.visibility  = m === "input"  ? "visible" : "hidden";
  document.getElementById("chk-choice").style.visibility = m === "choice" ? "visible" : "hidden";
}

/* ======================================================
   クイズ開始
====================================================== */
function startQuiz(reviewIds) {
  var rand = document.getElementById("opt-rand").checked;
  var missOnly = document.getElementById("opt-miss").checked;
  var h = loadH();
  var pool;

  if (reviewIds) {
    pool = Q.filter(function(q){ return reviewIds.indexOf(q.id) >= 0; });
    if (!pool.length) { alert("間違えた問題がありません"); return; }
  } else if (missOnly) {
    var mids = h.lastWrong || [];
    pool = Q.filter(function(q){ return mids.indexOf(q.id) >= 0; });
    if (!pool.length) { alert("間違えた問題がありません"); return; }
  } else {
    pool = Q.slice();
  }

  queue = rand ? shuffle(pool) : pool;
  idx = 0; okCnt = 0; ngIds = []; answered = false;

  document.getElementById("mode-pill").textContent =
    mode === "input" ? "✏️ 入力モード" : "🔘 ４択モード";

  show("scr-quiz");
  render();
}

/* ======================================================
   描画
====================================================== */
function render() {
  var q = queue[idx];
  var total = queue.length;
  document.getElementById("prog").style.width = (idx / total * 100) + "%";
  document.getElementById("q-count").textContent = (idx + 1) + " / " + total;
  if (mode === "input") renderInput(q);
  else renderChoice(q);
}

function qHTML(text) {
  var esc = text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
  return esc.replace("【】", '<span class="blank" id="blank">　　　　</span>');
}

function renderInput(q) {
  answered = false;
  var body = document.getElementById("quiz-body");
  body.innerHTML =
    '<div class="cat-badge">' + esc(q.cat) + '</div>' +
    '<div class="q-card">' + qHTML(q.q) + '</div>' +
    '<div class="score-bar">' +
      '<span class="s-ok">正解 ' + okCnt + '問</span>' +
      '<span class="s-all">/ ' + idx + '問完了</span>' +
    '</div>' +
    '<div class="inp-wrap">' +
      '<input class="ans-inp" id="ainp" type="text" placeholder="答えを入力..." ' +
        'autocomplete="off" autocorrect="off" autocapitalize="off" ' +
        'spellcheck="false" inputmode="text">' +
      '<button class="btn-judge" id="bjudge" type="button">判定する</button>' +
    '</div>' +
    '<div class="fb" id="fb"><span class="fb-ico" id="fbico"></span><span class="fb-txt" id="fbtxt"></span></div>' +
    '<button class="btn-next" id="bnext" type="button">次の問題へ ›</button>';

  var ainp = document.getElementById("ainp");
  var bjudge = document.getElementById("bjudge");
  var bnext  = document.getElementById("bnext");

  bjudge.addEventListener("click", function(){ judge(); });
  bnext.addEventListener("click", function(){ nextQ(); });
  ainp.addEventListener("keydown", function(e){
    if (e.key === "Enter" || e.keyCode === 13) {
      e.preventDefault();
      if (!answered) judge(); else nextQ();
    }
  });
  setTimeout(function(){ ainp.focus(); }, 100);
}

function judge() {
  if (answered) return;
  var q = queue[idx];
  var raw = document.getElementById("ainp").value;
  var norm = raw.replace(/[\s　]/g, "");
  var ans  = q.a.replace(/[\s　]/g, "");
  var ok = (norm === ans);
  answered = true;
  applyResult(ok, q.a);
  var bjudge = document.getElementById("bjudge");
  var ainp   = document.getElementById("ainp");
  if (bjudge) bjudge.disabled = true;
  if (ainp)   ainp.disabled   = true;
}

function renderChoice(q) {
  answered = false;
  var shuf = shuffle(q.ch.slice());
  var lbls = ["A","B","C","D"];
  var btns = "";
  for (var i = 0; i < shuf.length; i++) {
    btns += '<button class="choice" data-val="' + esc(shuf[i]) + '" type="button">' +
      '<span class="c-lbl">' + lbls[i] + '</span>' +
      '<span>' + esc(shuf[i]) + '</span></button>';
  }
  var body = document.getElementById("quiz-body");
  body.innerHTML =
    '<div class="cat-badge">' + esc(q.cat) + '</div>' +
    '<div class="q-card">' + qHTML(q.q) + '</div>' +
    '<div class="score-bar">' +
      '<span class="s-ok">正解 ' + okCnt + '問</span>' +
      '<span class="s-all">/ ' + idx + '問完了</span>' +
    '</div>' +
    '<div class="choices">' + btns + '</div>' +
    '<div class="fb" id="fb"><span class="fb-ico" id="fbico"></span><span class="fb-txt" id="fbtxt"></span></div>' +
    '<button class="btn-next" id="bnext" type="button">次の問題へ ›</button>';

  var choices = body.querySelectorAll(".choice");
  for (var j = 0; j < choices.length; j++) {
    (function(btn){
      btn.addEventListener("click", function(){
        if (answered) return;
        answered = true;
        var chosen = btn.getAttribute("data-val");
        var correct = queue[idx].a;
        var ok = (chosen === correct);
        // すべて無効化・正解表示
        for (var k = 0; k < choices.length; k++) {
          choices[k].disabled = true;
          var v = choices[k].getAttribute("data-val");
          if (v === correct) {
            choices[k].classList.add(choices[k] === btn ? (ok ? "ok" : "reveal") : "reveal");
          }
        }
        if (!ok) btn.classList.add("ng");
        applyResult(ok, correct);
      });
    })(choices[j]);
  }

  document.getElementById("bnext").addEventListener("click", function(){ nextQ(); });
}

function applyResult(ok, answer) {
  var blank = document.getElementById("blank");
  if (blank) {
    blank.textContent = answer;
    blank.classList.add(ok ? "ok" : "ng");
  }
  var fb    = document.getElementById("fb");
  var fbico = document.getElementById("fbico");
  var fbtxt = document.getElementById("fbtxt");
  fb.classList.add("show");
  if (ok) {
    fb.classList.add("ok");
    fbico.textContent = "✅";
    fbtxt.textContent = "正解！";
    okCnt++;
  } else {
    fb.classList.add("ng");
    fbico.textContent = "❌";
    fbtxt.innerHTML = "不正解。<br>正解は「<strong>" + esc(answer) + "</strong>」";
    ngIds.push(queue[idx].id);
  }
  document.getElementById("bnext").classList.add("show");
}

function nextQ() {
  idx++;
  if (idx >= queue.length) finish();
  else { window.scrollTo(0,0); render(); }
}

/* ======================================================
   結果
====================================================== */
function finish() {
  var total = queue.length;
  var pct = Math.round(okCnt / total * 100);

  // 保存
  var h = loadH();
  h.sessions = h.sessions || [];
  h.sessions.push({ c: okCnt, t: total });
  if (h.sessions.length > 50) h.sessions = h.sessions.slice(-50);
  h.lastWrong = ngIds.slice();
  h.lastDate  = nowStr();
  h.mastered  = h.mastered || [];
  for (var i = 0; i < queue.length; i++) {
    var qid = queue[i].id;
    if (ngIds.indexOf(qid) < 0 && h.mastered.indexOf(qid) < 0) h.mastered.push(qid);
  }
  saveH(h);

  // 表示
  var emoji = pct === 100 ? "🏆" : pct >= 80 ? "🎉" : pct >= 60 ? "😊" : "💪";
  document.getElementById("r-emoji").textContent = emoji;
  document.getElementById("r-pct").innerHTML = pct + "<span>%</span>";
  document.getElementById("r-detail").textContent = okCnt + "問正解 / " + total + "問中";

  var revBtn   = document.getElementById("btn-review");
  var wrongCard = document.getElementById("wrong-card");
  if (ngIds.length > 0) {
    revBtn.style.display = "block";
    wrongCard.style.display = "block";
    var wb = document.getElementById("wrong-body");
    wb.innerHTML = "";
    for (var j = 0; j < ngIds.length; j++) {
      var found = null;
      for (var k = 0; k < Q.length; k++) { if (Q[k].id === ngIds[j]) { found = Q[k]; break; } }
      if (!found) continue;
      var preview = found.q.replace("【】","＿＿");
      if (preview.length > 42) preview = preview.slice(0, 42) + "…";
      var d = document.createElement("div");
      d.className = "wrong-item";
      d.innerHTML = esc(preview) + "<br>→ <span class='wrong-ans'>" + esc(found.a) + "</span>";
      wb.appendChild(d);
    }
  } else {
    revBtn.style.display = "none";
    wrongCard.style.display = "none";
  }
  show("scr-result");
}

/* ======================================================
   ユーティリティ
====================================================== */
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function nowStr() {
  var d = new Date();
  return d.getFullYear() + "/" +
    pad(d.getMonth()+1) + "/" + pad(d.getDate()) + " " +
    pad(d.getHours()) + ":" + pad(d.getMinutes());
}
function pad(n) { return n < 10 ? "0" + n : "" + n; }

document.addEventListener("DOMContentLoaded", function() {

  document.getElementById("mc-input").addEventListener("click", function(){ selectMode("input"); });

    if (confirm("学習履歴をすべてリセットしますか？")) {
      localStorage.removeItem(LS);
      refreshHome();
    }
  });

  // 戻るボタン
  document.getElementById("btn-back").addEventListener("click", function(){
    if (confirm("ホームに戻りますか？（進捗はリセットされます）")) {
      show("scr-home"); refreshHome();
    }
  });

  // 結果ボタン
  document.getElementById("btn-retry").addEventListener("click", function(){
